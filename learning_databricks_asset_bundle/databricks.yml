# This is a Databricks asset bundle definition for learning_databricks_asset_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: learning_databricks_asset_bundle
  uuid: 262f4773-5bb7-4df3-92c7-000f95aac3b3

include:
  - resources/*.yml
  - resources/*/*.yml


# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-49df9864-0015.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-49df9864-0015.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/talal.haider@ietglobaltech.com to make sure we only have a single copy.
      root_path: /Workspace/Users/talal.haider@ietglobaltech.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: talal.haider@ietglobaltech.com
        level: CAN_MANAGE
